services:
  # 🌊 DeepCurrents 情报引擎
  deep-currents:
    build:
      context: .
    container_name: deep-currents
    restart: always
    network_mode: host  # 启用宿主机网络
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - NODE_ENV=production
      # 关键：因为共享网络，访问 rsshub 需改用 localhost
      - RSSHUB_BASE_URL=http://127.0.0.1:1200
    depends_on:
      - rsshub

  # 🔌 RSSHub 万能 RSS 转换器
  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: always
    network_mode: host  # 启用宿主机网络
    # 注意：ports 选项在 host 模式下会被忽略，建议删除以保持配置整洁
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=redis
      # 关键：访问 redis 需改用 localhost
      - REDIS_URL=redis://127.0.0.1:6379/
      - TWITTER_AUTH_TOKEN=${TWITTER_AUTH_TOKEN:-}
    depends_on:
      - redis

  # 🧠 Redis 缓存
  redis:
    image: redis:alpine
    container_name: rsshub-redis
    restart: always
    network_mode: host  # 启用宿主机网络