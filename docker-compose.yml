services:
  postgres:
    image: postgres:16-alpine
    container_name: deep-currents-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepcurrents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deepcurrents"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: deep-currents-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: deep-currents-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rsshub:
    image: diygod/rsshub:latest
    container_name: deep-currents-rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/
      TWITTER_AUTH_TOKEN: ${TWITTER_AUTH_TOKEN:-}
      PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTPS_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NODE_USE_ENV_PROXY: "1"
    depends_on:
      redis:
        condition: service_healthy

  deep-currents:
    build:
      context: .
    container_name: deep-currents
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      EVENT_INTELLIGENCE_ENABLED: ${EVENT_INTELLIGENCE_ENABLED:-true}
      EVENT_INTELLIGENCE_POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/deepcurrents
      EVENT_INTELLIGENCE_QDRANT_URL: http://qdrant:6333
      EVENT_INTELLIGENCE_REDIS_URL: redis://redis:6379/0
      RSSHUB_BASE_URL: http://rsshub:1200
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      rsshub:
        condition: service_started

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
