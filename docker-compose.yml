services:
  postgres:
    image: postgres:16-alpine
    container_name: deep-currents-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepcurrents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deepcurrents"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepcurrents-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: deep-currents-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepcurrents-net

  redis:
    image: redis:alpine
    container_name: deep-currents-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepcurrents-net

  rsshub:
    image: diygod/rsshub:latest
    container_name: deep-currents-rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment: &proxy-config
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/
      TWITTER_AUTH_TOKEN: ${TWITTER_AUTH_TOKEN:-}
      HTTP_PROXY: ${DOCKER_HTTPS_PROXY:-}
      HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
      ALL_PROXY: ${DOCKER_HTTPS_PROXY:-}
      NO_PROXY: localhost,127.0.0.1,host.docker.internal,postgres,qdrant,redis,rsshub
      no_proxy: localhost,127.0.0.1,host.docker.internal,postgres,qdrant,redis,rsshub
      NODE_USE_ENV_PROXY: "1"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - deepcurrents-net

  deep-currents:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        NO_PROXY: localhost,127.0.0.1,host.docker.internal,postgres,qdrant,redis,rsshub
    container_name: deep-currents
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *proxy-config
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      EVENT_INTELLIGENCE_ENABLED: ${EVENT_INTELLIGENCE_ENABLED:-true}
      EVENT_INTELLIGENCE_POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/deepcurrents
      EVENT_INTELLIGENCE_QDRANT_URL: http://qdrant:6333
      EVENT_INTELLIGENCE_REDIS_URL: redis://redis:6379/0
      RSSHUB_BASE_URL: http://rsshub:1200
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      rsshub:
        condition: service_started
    networks:
      - deepcurrents-net

networks:
  deepcurrents-net:
    driver: bridge

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
